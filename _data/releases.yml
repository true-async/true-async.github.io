docker_images:
  - tag: "trueasync/php-true-async:0.6.0-php8.6"
    description: "Ubuntu 24.04 — CLI + FPM"
  - tag: "trueasync/php-true-async:0.6.0-php8.6-alpine"
    description: "Alpine 3.20 — CLI + FPM (lightweight)"
  - tag: "trueasync/php-true-async:0.6.0-php8.6-debug"
    description: "Ubuntu 24.04 — CLI + FPM (debug symbols)"
  - tag: "trueasync/php-true-async:latest"
    description: "Ubuntu 24.04 — alias for latest stable"
  - tag: "trueasync/php-true-async:latest-alpine"
    description: "Alpine 3.20 — alias for latest stable"

